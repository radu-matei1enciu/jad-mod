apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: edc-v
  labels:
    app: grafana
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      name: grafana
      labels:
        app: grafana
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: edc-v
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.edc-v.svc.cluster.local:9090
        isDefault: true
        jsonData:
          timeInterval: 15s

      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger.edc-v.svc.cluster.local:16686
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1m"
            spanEndTimeShift: "1m"
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: prometheus

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.edc-v.svc.cluster.local:3100
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceId"\s*:\s*"(\w+)"'
              url: "$${__value.raw}"
              datasourceUid: jaeger

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: edc-v
spec:
  parentRefs:
    - name: edcv-gateway
  hostnames:
    - grafana.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          port: 3000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: edc-v
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards