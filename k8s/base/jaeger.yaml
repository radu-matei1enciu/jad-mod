apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: edc-v
  labels:
    app: jaeger
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      name: jaeger
      labels:
        app: jaeger
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62.0 # use 1.62.0 because latest has some weird UI theming problems
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 16686
              protocol: TCP
              name: ui
            - containerPort: 4317
              protocol: TCP
              name: grpc
            - containerPort: 4318
              protocol: TCP
              name: http
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: trace-http
      port: 4318
      targetPort: 4318
    - name: grpc
      port: 4317
      targetPort: 4317

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: edc-v
spec:
  parentRefs:
    - name: edcv-gateway
  hostnames:
    - jaeger.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jaeger
          port: 16686