apiVersion: batch/v1
kind: Job
metadata:
  name: tenant-manager-seed
  namespace: edc-v
  labels:
    app: tenant-manager-seed
    platform: edcv
    type: edcv-job
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: tenant-manager-seed
        platform: edcv
        type: edcv-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for tenant-manager to be ready
        - name: wait-for-tenant-manager
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              until curl -sf http://tenant-manager.edc-v.svc.cluster.local:8080/api/v1alpha1/cells; do
                echo "Waiting for tenant-manager to be ready..."
                sleep 5
              done
              echo "Tenant Manager is ready!"
      containers:
        - name: seed-tenant-manager
          image: curlimages/curl:latest
          env:
            - name: TM_BASE_URL
              value: "http://tenant-manager.edc-v.svc.cluster.local:8080"
          command:
            - sh
            - -c
            - |
              set -e

              echo "================================================"
              echo "TenantManager Seeding"
              echo "================================================"

              # Create Cell
              echo "Creating Cell..."
              CELL_RESPONSE=$(curl -s -X POST "$TM_BASE_URL/api/v1alpha1/cells" \
                -H "Content-Type: application/json" \
                -d '{
                  "properties": {
                    "newCellKey": "newCellValue"
                  },
                  "state": "active",
                  "stateTimestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
                }')

              CELL_ID=$(echo "$CELL_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Cell created with ID: $CELL_ID"

              # Create First Dataspace Profile
              echo "Creating First Dataspace Profile..."
              FIRST_PROFILE_RESPONSE=$(curl -s -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles" \
                -H "Content-Type: application/json" \
                -d '{
                  "artifacts": [],
                  "properties": {},
                  "dataspaceSpec": {
                     "protocolStack": ["dsp-2025-1", "dcp-2025-1"],
                     "credentialSpecs": [{
                        "type": "CatenaMembershipCredential",
                        "issuer": "did:web:issuerservice.edc-v.svc.cluster.local%3A10016:issuer",
                        "format": "VC2_0_JOSE",
                        "id": "catena-membership-credential-def"
                      },
                      {
                        "type": "CatenaManufacturerCredential",
                        "issuer": "did:web:issuerservice.edc-v.svc.cluster.local%3A10016:issuer",
                        "format": "VC2_0_JOSE",
                        "id": "catena-manufacturer-credential-def",
                        "role": "manufacturer"
                      }
                    ]
                  }
                }')

              FIRST_DATASPACE_PROFILE_ID=$(echo "$FIRST_PROFILE_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Dataspace Profile created with ID: $FIRST_DATASPACE_PROFILE_ID"

              # Deploy First Dataspace Profile
              echo "Deploying First Dataspace Profile..."
              curl -sfS -w "\nHTTP_STATUS:%{http_code}\n" -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles/$FIRST_DATASPACE_PROFILE_ID/deployments" \
                -H "Content-Type: application/json" \
                -d '{
                  "profileId": "'"$FIRST_DATASPACE_PROFILE_ID"'",
                  "cellId": "'"$CELL_ID"'"
                }'

              # Create Second Dataspace Profile
              echo "Creating Second Dataspace Profile..."
              SECOND_PROFILE_RESPONSE=$(curl -s -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles" \
                -H "Content-Type: application/json" \
                -d '{
                  "artifacts": [],
                  "properties": {},
                  "dataspaceSpec": {
                     "protocolStack": ["dsp-2025-1", "dcp-2025-1"],
                     "credentialSpecs": [{
                        "type": "BikeMembershipCredential",
                        "issuer": "did:web:issuerservice.edc-v.svc.cluster.local%3A10016:issuer",
                        "format": "VC2_0_JOSE",
                        "id": "bike-membership-credential-def"
                      },
                      {
                        "type": "BikeManufacturerCredential",
                        "issuer": "did:web:issuerservice.edc-v.svc.cluster.local%3A10016:issuer",
                        "format": "VC2_0_JOSE",
                        "id": "bike-manufacturer-credential-def",
                        "role": "manufacturer"
                      }
                    ]
                  }
                }')

              SECOND_DATASPACE_PROFILE_ID=$(echo "$SECOND_PROFILE_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Second Dataspace Profile created with ID: $SECOND_DATASPACE_PROFILE_ID"

              # Deploy Second Dataspace Profile
              echo "Deploying Second Dataspace Profile..."
              curl -sfS -w "\nHTTP_STATUS:%{http_code}\n" -X POST "$TM_BASE_URL/api/v1alpha1/dataspace-profiles/$SECOND_DATASPACE_PROFILE_ID/deployments" \
                -H "Content-Type: application/json" \
                -d '{
                  "profileId": "'"$SECOND_DATASPACE_PROFILE_ID"'",
                  "cellId": "'"$CELL_ID"'"
                }'

              echo "Dataspace Profile deployed successfully"
              echo "================================================"
              echo "TenantManager Seeding Complete"
              echo "================================================"

