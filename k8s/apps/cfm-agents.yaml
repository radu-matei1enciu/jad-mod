apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfm-agents
  namespace: edc-v
  labels:
    app: cfm-agents
    platform: edcv
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfm-agents
  template:
    metadata:
      labels:
        app: cfm-agents
        platform: edcv
        type: edcv-app
    spec:
      containers:
        - name: keycloak-agent
          image: ghcr.io/eclipse-cfm/cfm/kcagent@sha256:ebc84e0d620842e546c43f9e31e5209ddb4103fa38b6bd1950c2d724c2460788
          imagePullPolicy: Always
          command: [ "/kcagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: keycloak-agent-config
              mountPath: /etc/appname
              readOnly: true
        - name: edcv-agent
          image: ghcr.io/eclipse-cfm/cfm/edcvagent@sha256:e38ded5242d18d4e3a59db76f84e16dd68693f44d0f387c7b918919b4254218a
          imagePullPolicy: Always
          command: [ "/edcvagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: edcv-agent-config
              mountPath: /etc/appname
              readOnly: true
        - name: registration-agent
          image: ghcr.io/eclipse-cfm/cfm/regagent@sha256:60ad4008c88eefb836e50404bf656f952f7b817bba0aa468e8a68423c9eb949c
          imagePullPolicy: Always
          command: [ "/regagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: registration-agent-config
              mountPath: /etc/appname
              readOnly: true
        - name: onboarding-agent
          image: ghcr.io/eclipse-cfm/cfm/obagent@sha256:6f1950a9bccc5b6f7bfc05899da480cecdc716da57275100ce313db1b9baa866
          imagePullPolicy: Always
          command: [ "/obagent" ]
          args: [
            "--mode=debug"
          ]
          envFrom:
            - configMapRef:
                name: telemetry-config
          volumeMounts:
            - name: onboarding-agent-config
              mountPath: /etc/appname
              readOnly: true
      volumes:
        - name: keycloak-agent-config
          configMap:
            name: keycloak-agent-config
        - name: edcv-agent-config
          configMap:
            name: edcv-agent-config
        - name: registration-agent-config
          configMap:
            name: reg-agent-config
        - name: onboarding-agent-config
          configMap:
            name: ob-agent-config
      restartPolicy: Always
